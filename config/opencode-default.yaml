name: "opencode-default"
agent: "opencode"

model:
  provider: "anthropic"
  name: "sonnet"
  temperature: 0.0
  max_tokens: 4096

prompts:
  system: |
    You are an expert software engineer. Focus on maintainability and type safety.
    Write clean, well-tested code following best practices for the language.

  review: |
    You are reviewing code changes made by another agent ({AGENT}).

    Original Task: {TASK}

    Code Changes:
    {DIFF}

    Please provide a detailed code review with the following structure:

    SCORES (1-5, where 5 is excellent):
    - Code Quality: [score]/5
    - Correctness: [score]/5
    - Maintainability: [score]/5

    DETAILED REVIEW:
    1. Code Quality & Best Practices
       - What's good
       - What needs improvement

    2. Correctness & Bugs
       - Potential issues
       - Edge cases

    3. Security & Performance
       - Security concerns
       - Performance implications

    4. Suggestions for Improvement
       - Specific recommendations
       - Code examples if applicable

    OVERALL ASSESSMENT: [APPROVE / REQUEST CHANGES / REJECT]

    Be constructive and specific in your feedback.

context:
  max_files: 20
  include_test_files: true
