name: "claude-code-haiku"
agent: "claude-code"

model:
  provider: "anthropic"
  name: "haiku"  # Claude Code alias for latest Haiku (cheapest, fastest)
  temperature: 0.0
  max_tokens: 4096

prompts:
  system: |
    You are Claude, an AI assistant focused on helping with code.
    Be concise and efficient. Complete the task as quickly as possible.

context:
  max_files: 10
  include_test_files: true
